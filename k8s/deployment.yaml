apiVersion: apps/v1
kind: Deployment
metadata:
  name: nlip-builder-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nlip-builder-agent
  template:
    metadata:
      labels:
        app: nlip-builder-agent
    spec:
      containers:
        - name: nlip-builder-agent
          image: nlip-builder-agent:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          env:
            - name: NLIP_MODEL_NAME
              value: llama-4-scout
---
apiVersion: v1
kind: Service
metadata:
  name: nlip-builder-agent
spec:
  selector:
    app: nlip-builder-agent
  ports:
    - name: http
      port: 8081
      targetPort: 8081
